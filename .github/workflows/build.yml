name: Build SEPTA GTFS data

on:
  schedule:
    - cron: '17 6 * * 1'  # Mondays 06:17 UTC (~02:17 ET) — after weekly SEPTA refresh
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'build.js'
      - '.github/workflows/build.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build per-route JSON from SEPTA GTFS
        run: node build.js

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh GTFS $(date -u +%Y-%m-%d)"
            git push
          fi
